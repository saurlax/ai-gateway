log_level: info

master:
  listen: ":8140"
  db_path: "./data/master.db"
  jwt_secret: "replace-me"
  # (Recommended for production) BYOK encryption KEK, base64-encoded 32 random bytes.
  # Omit only for dev / single-instance deployments — we then fall back to
  # HKDF-SHA256(jwt_secret, info="byok-kek-v1").
  # Production should set this explicitly because:
  #   - HKDF couples jwt_secret to the BYOK KEK; leaking jwt_secret then leaks
  #     every BYOK ciphertext too (single point of failure).
  #   - Rotating jwt_secret invalidates every stored BYOK ciphertext (forces
  #     all users to re-enter their keys).
  # Generate: openssl rand -base64 32
  # byok_kek: ""
  enrollment_token_ttl: 3600
  admin_user: "admin"
  admin_password: "change-this-password"
  # 允许通过浏览器进入 OAuth 流程的对外 origin 列表（http(s)://host[:port]）。
  # 请求的 Host（含 X-Forwarded-Host）必须命中其中一条；命中条作为 redirect_uri origin。
  # 列表为空时回退到从 listen 推断 origin，仅适合本地开发。
  # 每条 origin 都需要在对应 IdP 端注册为允许的 redirect_uri：
  # ${origin}/api/oauth/<provider>/callback
  public_base_urls:
    - "http://localhost:8140"

agent:
  listen: ":8139"
  master_url: "http://127.0.0.1:8140"
  enrollment_token: ""
  credentials_file: "./data/agent_credentials.json"
  # Local entity cache (token / user / routing / private channel). Omit to use defaults.
  cache:
    token_capacity: 20000
    user_capacity: 20000
    user_routings_capacity: 5000
    private_channels_capacity: 5000
    # Negative cache TTL for "not found" lookups.
    #   0  = use default (600s)
    #   -1 = disable negative caching
    #   N  = cache misses for N seconds
    negative_ttl_seconds: 600

# Upstream relay tuning. Omit this block to use defaults.
# relay:
#   timeout: 300              # non-stream total timeout + upstream response-header timeout (seconds)
#   keepalive_idle: 15        # seconds idle before TCP keepalive probing starts
#   keepalive_interval: 15    # seconds between keepalive probes
#   keepalive_count: 3        # unanswered probes before a connection is declared dead (~60s)

# Optional advanced tuning. Omit this entire block unless you need to tune
# runtime behavior explicitly.
# runtime:
#   relay_timeout: 300
#   full_sync_interval: 300
#   report_buffer_size: 1000
#   report_flush_interval: 5
#   heartbeat_interval: 30
#   retry_max: 5
